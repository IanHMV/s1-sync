# ============================================================================
#  Agrega este bloque dentro de "services:" en tu docker-compose.yml
#  (al mismo nivel que s1-database, s1-oauth y s1-api).
#
#  Reutiliza el usuario root de Mongo que ya tienes en tu .env
#  (DB_ROOT_USER / DB_ROOT_PASSWORD). Solo necesitas agregar a tu .env:
#     SYNC_ENC_KEY=...     (generala con: openssl rand -hex 32)
#  y opcionalmente: SYNC_CRON, SYNC_RUN_ON_START, etc.
# ============================================================================
  s1-sync:
    build: ./s1-sync
    container_name: s1-sync
    hostname: sync.s1.pdn
    restart: always
    depends_on:
      - s1-database
    environment:
      # Conexion a Mongo: reutiliza las credenciales root del stack
      SYNC_MONGO_HOST: s1-database
      SYNC_MONGO_PORT: "27017"
      SYNC_MONGO_USER: ${DB_ROOT_USER}
      SYNC_MONGO_PASS: ${DB_ROOT_PASSWORD}
      SYNC_MONGO_AUTHDB: admin
      # Destino (lo que lee tu s1-api)
      S1_DB_NAME: s1-api
      S1_COLLECTION: declaraciones
      SYNC_DB_NAME: s1-sync
      # Seguridad y programacion
      SYNC_ENC_KEY: ${SYNC_ENC_KEY}
      SYNC_CRON: ${SYNC_CRON:-0 3 1,16 * *}
      SYNC_TZ: ${SYNC_TZ:-America/Mexico_City}
      SYNC_RUN_ON_START: ${SYNC_RUN_ON_START:-false}
      SYNC_PAGE_SIZE: ${SYNC_PAGE_SIZE:-100}
      SYNC_LOG_LEVEL: ${SYNC_LOG_LEVEL:-info}
